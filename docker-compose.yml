services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: network
      POSTGRES_PASSWORD: network
      POSTGRES_DB: network_editor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  api:
    image: golang:1.23
    working_dir: /app/server-go
    command: go run ./cmd/api
    environment:
      ADDR: ":8080"
      DATABASE_URL: postgres://network:network@postgres:5432/network_editor?sslmode=disable
      SESSION_SECRET: change-this-dev-secret
      CORS_ORIGIN: http://localhost:5173,http://localhost:5174
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    depends_on:
      - postgres

volumes:
  postgres_data:
